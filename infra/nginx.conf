# Nginx reverse proxy for the Mozey API.
#
# Only the API needs nginx in production — the Admin Panel and Landing Page
# are served by Vercel. nginx terminates TLS for api.mozey.uz and proxies to
# the dockerized NestJS container on port 3000.
#
# Assumes nginx runs on the droplet host (not inside docker compose). If you
# want to move nginx into the compose network instead, change the upstream
# server below from `127.0.0.1:3000` to `api:3000` and put nginx in the same
# network as the api service.

upstream mozey_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- HTTP: ACME challenge + permanent redirect to HTTPS -----------------
server {
    listen 80;
    listen [::]:80;
    server_name api.mozey.uz;

    # Let's Encrypt challenge path. Keep this above the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: api.mozey.uz ------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mozey.uz;

    # certbot --nginx writes these. If you bootstrap manually, point them at
    # /etc/letsencrypt/live/api.mozey.uz/{fullchain,privkey}.pem after running
    # `certbot --nginx -d api.mozey.uz`.
    ssl_certificate     /etc/letsencrypt/live/api.mozey.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mozey.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozeyTLS:10m;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://mozey_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # Long-lived cache for uploaded photos served at /static/uploads/.
    location /static/ {
        proxy_pass http://mozey_api;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
