# Nginx reverse proxy configuration for O'zbekiston Muzeylari Platform
# Used in production when all services run behind nginx

upstream api_backend {
    server api:3000;
}

upstream admin_frontend {
    server admin:3001;
}

upstream landing_frontend {
    server landing:3002;
}

# API — api.muzeylari.uz
server {
    listen 80;
    server_name api.muzeylari.uz;

    client_max_body_size 50M;

    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (handled by NestJS, but can be doubled here)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}

# Admin Panel — admin.muzeylari.uz
server {
    listen 80;
    server_name admin.muzeylari.uz;

    location / {
        proxy_pass http://admin_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Landing Page — muzeylari.uz
server {
    listen 80;
    server_name muzeylari.uz www.muzeylari.uz;

    location / {
        proxy_pass http://landing_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location /_next/static {
        proxy_pass http://landing_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
