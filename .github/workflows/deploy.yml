name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - admin
          - landing

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Deploy API to DigitalOcean (SSH + docker-compose)
  # Pulls latest main on the droplet, rebuilds the api container,
  # then runs `prisma migrate deploy` inside it.
  # ============================================
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    if: inputs.service == 'all' || inputs.service == 'api'
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DO_DEPLOY_PATH }}
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main
            docker compose -f infra/docker-compose.yml build api
            docker compose -f infra/docker-compose.yml up -d --no-deps api
            docker compose -f infra/docker-compose.yml exec -T api \
              npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

  # ============================================
  # Deploy Admin to Vercel
  # ============================================
  deploy-admin:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest
    if: inputs.service == 'all' || inputs.service == 'admin'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=$VERCEL_TOKEN

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=$VERCEL_TOKEN

  # ============================================
  # Deploy Landing to Vercel
  # ============================================
  deploy-landing:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    if: inputs.service == 'all' || inputs.service == 'landing'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=$VERCEL_TOKEN

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=$VERCEL_TOKEN
